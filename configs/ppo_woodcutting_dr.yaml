# PPO + visual domain randomization. Identical training hyperparams to
# ppo_woodcutting.yaml — the only delta is the randomization block, so any
# improvement (or regression) isolates to the visual invariance story.

seed: 42
device: auto

env:
  grid_size: 16
  tile_size: 8
  num_trees: 6
  max_inventory: 10
  max_episode_steps: 300
  chop_ticks: 1
  tree_respawn_ticks: 10

vision:
  resize_to: 84
  grayscale: true
  frame_stack: 4

reward:
  log_collected: 5.0
  step_penalty: -0.01
  invalid_action_penalty: -0.02
  idle_penalty: -0.05
  distance_shaping: 0.1
  adjacency_bonus: 0.5
  full_inventory_bonus: 10.0

# Domain randomization — "moderate" preset. Per-episode jitter for palette, HUD
# position, distractor clutter, and tree size; per-frame brightness/contrast/noise.
randomization:
  enabled: true
  color_jitter: 0.18
  clutter_density: 0.06
  tree_size_jitter: 1
  hud_randomize_side: true
  brightness_jitter: 0.15
  contrast_jitter: 0.12
  pixel_noise_std: 6.0

ppo:
  total_timesteps: 300000
  num_envs: 8
  rollout_steps: 128
  num_epochs: 4
  num_minibatches: 4
  clip_coef: 0.2
  vf_coef: 0.5
  gamma: 0.99
  gae_lambda: 0.95
  learning_rate: 0.00025
  anneal_lr: true
  max_grad_norm: 0.5
  target_kl: null
  norm_adv: true
  clip_vloss: true
  ent_coef: 0.01

logging:
  run_name: ppo_woodcutting_dr
  log_dir: runs
  log_interval_updates: 1
  checkpoint_interval_updates: 25
  eval_interval_updates: 25
  eval_episodes: 5
