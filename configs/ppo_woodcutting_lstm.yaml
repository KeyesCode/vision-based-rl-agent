# Recurrent PPO — CNN encoder + single-layer LSTM head. All hyperparameters
# match ppo_woodcutting.yaml so any delta isolates to "the policy now has memory."

seed: 42
device: auto

env:
  grid_size: 16
  tile_size: 8
  num_trees: 6
  max_inventory: 10
  max_episode_steps: 300
  chop_ticks: 1
  tree_respawn_ticks: 10

vision:
  resize_to: 84
  grayscale: true
  frame_stack: 4

reward:
  log_collected: 5.0
  step_penalty: -0.01
  invalid_action_penalty: -0.02
  idle_penalty: -0.05
  distance_shaping: 0.1
  adjacency_bonus: 0.5
  full_inventory_bonus: 10.0

ppo:
  total_timesteps: 300000
  num_envs: 8
  rollout_steps: 128
  num_epochs: 4
  num_minibatches: 4
  clip_coef: 0.2
  vf_coef: 0.5
  gamma: 0.99
  gae_lambda: 0.95
  learning_rate: 0.00025
  anneal_lr: true
  max_grad_norm: 0.5
  target_kl: null
  norm_adv: true
  clip_vloss: true
  ent_coef: 0.01
  # --- Recurrent policy ---
  recurrent: true
  lstm_hidden_size: 256

logging:
  run_name: ppo_woodcutting_lstm
  log_dir: runs
  log_interval_updates: 1
  checkpoint_interval_updates: 25
  eval_interval_updates: 25
  eval_episodes: 5
